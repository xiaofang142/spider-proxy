<?xml version="1.0" encoding="utf-8" ?>
<svg baseProfile="full" height="900px" version="1.1" width="1440px" xmlns="http://www.w3.org/2000/svg" xmlns:ev="http://www.w3.org/2001/xml-events" xmlns:xlink="http://www.w3.org/1999/xlink"><defs /><rect fill="#F5F7FA" height="900" width="1440" x="0" y="0" /><rect fill="#FFFFFF" height="64" width="1440" x="0" y="0" /><line stroke="#E0E0E0" stroke-width="1" x1="0" x2="1440" y1="64" y2="64" /><circle cx="48" cy="32" fill="#FF6B35" r="14" /><text fill="#1A1A1A" font-family="Arial" font-size="18" font-weight="bold" x="64" y="42">Spider Proxy</text><rect fill="#F5F7FA" height="40" rx="6" stroke="#E0E0E0" stroke-width="1" width="300" x="400" y="12" /><text fill="#999999" font-family="Arial" font-size="14" x="436" y="38">🔍 搜索请求 (支持自然语言)...</text><text font-family="Arial" font-size="20" x="1260" y="42">🔔</text><text font-family="Arial" font-size="20" x="1320" y="42">⚙️</text><text font-family="Arial" font-size="20" x="1380" y="42">👤</text><text fill="#333333" font-family="Arial" font-size="14" x="24" y="100">📊  仪表盘</text><text fill="#333333" font-family="Arial" font-size="14" x="24" y="156">📦  抓包列表</text><rect fill="#FFF3ED" height="56" width="240" x="0" y="176" /><rect fill="#FF6B35" height="56" width="4" x="0" y="176" /><text fill="#FF6B35" font-family="Arial" font-size="14" x="24" y="212">🔍  过滤器</text><text fill="#333333" font-family="Arial" font-size="14" x="24" y="268">📜  脚本编辑</text><text fill="#333333" font-family="Arial" font-size="14" x="24" y="324">⚙️  设置</text><text fill="#1A1A1A" font-family="Arial" font-size="28" font-weight="bold" x="280" y="126">过滤器管理</text><rect fill="#FF6B35" height="44" rx="6" width="160" x="1240" y="106" /><text fill="#FFFFFF" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle" x="1320" y="134">+ 新建过滤器</text><rect fill="#FFFFFF" height="80" rx="8" width="400" x="280" y="176" /><rect fill="none" height="80" rx="8" stroke="#E0E0E0" stroke-width="1" width="400" x="280" y="176" /><text fill="#1A1A1A" font-family="Arial" font-size="16" font-weight="bold" x="300" y="206">🔍 API 请求</text><text fill="#666666" font-family="Arial" font-size="13" x="300" y="231">域名：api.* | 方法：GET,POST</text><text font-family="Arial" font-size="18" x="620" y="206">✏️</text><text font-family="Arial" font-size="18" x="650" y="206">🗑️</text><rect fill="#FFFFFF" height="80" rx="8" width="400" x="280" y="276" /><rect fill="none" height="80" rx="8" stroke="#E0E0E0" stroke-width="1" width="400" x="280" y="276" /><text fill="#1A1A1A" font-family="Arial" font-size="16" font-weight="bold" x="300" y="306">📸 图片资源</text><text fill="#666666" font-family="Arial" font-size="13" x="300" y="331">内容类型：image/*</text><text font-family="Arial" font-size="18" x="620" y="306">✏️</text><text font-family="Arial" font-size="18" x="650" y="306">🗑️</text><rect fill="#FFFFFF" height="80" rx="8" width="400" x="280" y="376" /><rect fill="none" height="80" rx="8" stroke="#E0E0E0" stroke-width="1" width="400" x="280" y="376" /><text fill="#1A1A1A" font-family="Arial" font-size="16" font-weight="bold" x="300" y="406">🔐 认证请求</text><text fill="#666666" font-family="Arial" font-size="13" x="300" y="431">路径：/login,/auth</text><text font-family="Arial" font-size="18" x="620" y="406">✏️</text><text font-family="Arial" font-size="18" x="650" y="406">🗑️</text><rect fill="#FFFFFF" height="80" rx="8" width="400" x="280" y="476" /><rect fill="none" height="80" rx="8" stroke="#E0E0E0" stroke-width="1" width="400" x="280" y="476" /><text fill="#1A1A1A" font-family="Arial" font-size="16" font-weight="bold" x="300" y="506">⚡ 慢请求</text><text fill="#666666" font-family="Arial" font-size="13" x="300" y="531">响应时间：&gt;1000ms</text><text font-family="Arial" font-size="18" x="620" y="506">✏️</text><text font-family="Arial" font-size="18" x="650" y="506">🗑️</text><rect fill="#FFFFFF" height="200" rx="8" width="400" x="720" y="176" /><rect fill="none" height="200" rx="8" stroke="#E0E0E0" stroke-width="1" width="400" x="720" y="176" /><text fill="#1A1A1A" font-family="Arial" font-size="16" font-weight="bold" x="740" y="211">过滤条件配置</text><text fill="#666666" font-family="Arial" font-size="13" x="740" y="264">域名匹配:</text><rect fill="#F5F7FA" height="32" rx="4" stroke="#E0E0E0" stroke-width="1" width="260" x="840" y="250" /><text fill="#333333" font-family="Arial" font-size="14" x="850" y="272">api.example.com</text><text fill="#666666" font-family="Arial" font-size="13" x="740" y="304">HTTP 方法:</text><rect fill="#F5F7FA" height="32" rx="4" stroke="#E0E0E0" stroke-width="1" width="260" x="840" y="290" /><text fill="#333333" font-family="Arial" font-size="14" x="850" y="312">GET, POST</text><text fill="#666666" font-family="Arial" font-size="13" x="740" y="344">状态码:</text><rect fill="#F5F7FA" height="32" rx="4" stroke="#E0E0E0" stroke-width="1" width="260" x="840" y="330" /><text fill="#333333" font-family="Arial" font-size="14" x="850" y="352">200, 201</text><rect fill="#FFFFFF" height="150" rx="8" width="400" x="720" y="416" /><rect fill="none" height="150" rx="8" stroke="#E0E0E0" stroke-width="1" width="400" x="720" y="416" /><text fill="#1A1A1A" font-family="Arial" font-size="16" font-weight="bold" x="740" y="451">正则表达式测试</text><rect fill="#F5F7FA" height="36" rx="4" stroke="#E0E0E0" stroke-width="1" width="360" x="740" y="471" /><text fill="#333333" font-family="Courier" font-size="13" x="750" y="494">Pattern: ^/api/v[0-9]+/.*</text><rect fill="#FF6B35" height="32" rx="4" width="100" x="1000" y="521" /><text fill="#FFFFFF" font-family="Arial" font-size="14" text-anchor="middle" x="1050" y="542">测试</text><rect fill="#FF6B35" height="44" rx="6" width="120" x="720" y="596" /><text fill="#FFFFFF" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle" x="780" y="624">保存预设</text><rect fill="#F44336" height="44" rx="6" width="120" x="860" y="596" /><text fill="#FFFFFF" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle" x="920" y="624">删除预设</text></svg>