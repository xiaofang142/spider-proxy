ght="bold" text-anchor="middle" x="1290" y="690">▶ 运行</text><text fill="#666666" font-family="Arial" font-size="14" x="280" y="766">模板选择:</text><rect fill="#FFFFFF" height="40" rx="4" stroke="#E0E0E0" stroke-width="1" width="120" x="380" y="746" /><text fill="#333333" font-family="Arial" font-size="13" text-anchor="middle" x="440" y="772">请求修改</text><rect fill="#FFFFFF" height="40" rx="4" stroke="#E0E0E0" stroke-width="1" width="120" x="520" y="746" /><text fill="#333333" font-family="Arial" font-size="13" text-anchor="middle" x="580" y="772">响应修改</text><rect fill="#FFFFFF" height="40" rx="4" stroke="#E0E0E0" stroke-width="1" width="120" x="660" y="746" /><text fill="#333333" font-family="Arial" font-size="13" text-anchor="middle" x="720" y="772">认证注入</text><rect fill="#FFFFFF" height="40" rx="4" stroke="#E0E0E0" stroke-width="1" width="120" x="800" y="746" /><text fill="#333333" font-family="Arial" font-size="13" text-anchor="middle" x="860" y="772">日志记录</text><rect fill="#1E1E1E" height="150" rx="4" width="1080" x="280" y="816" /><text fill="#666666" font-family="Arial" font-size="13" x="300" y="846">Console Output</text><text fill="#98C379" font-family="Courier" font-size="13" x="300" y="879">[INFO] Script loaded successfully</text><text fill="#61AFD6" font-family="Courier" font-size="13" x="300" y="907">[DEBUG] Processing request...</text><text fill="#98C379" font-family="Courier" font-size="13" x="300" y="935">[INFO] Request modified</text></svg>